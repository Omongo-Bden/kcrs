services:
  # Backend Web Service
  - type: web
    name: crs-backend
    env: python
    rootDir: backend
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "gunicorn config.wsgi:application --workers 4 --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: crs-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: crs-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://crs-frontend.onrender.com"
      - key: ALLOWED_HOSTS
        value: "crs-backend.onrender.com"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_STORAGE_BUCKET_NAME
        sync: false

  # Celery Worker Service
  - type: worker
    name: crs-celery
    env: python
    rootDir: backend
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "celery -A config worker --loglevel=info"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: crs-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: crs-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"

  # Frontend Static Site
  - type: web
    name: crs-frontend
    env: node
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    startCommand: "npm run preview -- --port $PORT --host 0.0.0.0"
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: VITE_API_URL
        value: "https://crs-backend.onrender.com/api"
      - key: VITE_API_BASE_URL
        value: "https://crs-backend.onrender.com"

databases:
  - name: crs-db
    databaseName: crs
    user: crs_user
    plan: free

  - type: redis
    name: crs-redis
    plan: free
