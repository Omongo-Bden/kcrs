services:
  # Backend Web Service
  - type: web
    name: crs-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "gunicorn config.wsgi:application --workers 4 --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: crs-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://crs-frontend.onrender.com"
      - key: ALLOWED_HOSTS
        value: "crs-backend.onrender.com"
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_STORAGE_BUCKET_NAME
        sync: false

  # Frontend Static Site (Free and highly optimized)
  - type: web
    name: crs-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: "dist"
    envVars:
      - key: NODE_VERSION
        value: "18.17.0"
      - key: VITE_API_URL
        value: "https://crs-backend.onrender.com/api"
      - key: VITE_API_BASE_URL
        value: "https://crs-backend.onrender.com"

databases:
  - name: crs-db
    databaseName: crs
    user: crs_user
    plan: free
